spring:
  application:
    name: notification-worker
  main:
    web-application-type: none
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/assignment}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate

notification:
  role:
    api: false
    worker: true
