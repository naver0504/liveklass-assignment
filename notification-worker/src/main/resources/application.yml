spring:
  application:
    name: notification-worker
  main:
    web-application-type: none
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/assignment}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false
notification:
  polling:
    enabled: true
    fixed-delay-ms: 1000
    batch-size: 50
    stuck-threshold-minutes: 5
